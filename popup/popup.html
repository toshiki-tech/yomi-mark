<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YomiMark</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo-row">
        <img src="../icons/icon.svg" alt="YomiMark" class="logo-icon">
        <div class="logo-text">
          <h1>YomiMark</h1>
          <span class="tagline">Furigana & Loanword Hints</span>
        </div>
      </div>
      <div class="toggle-wrapper">
        <label class="toggle" for="enable-toggle">
          <input type="checkbox" id="enable-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <div class="status-bar" id="status-bar">
      <span class="status-dot"></span>
      <span class="status-text" id="status-text">Ready</span>
    </div>

    <section class="how-to">
      <div class="step">
        <span class="step-num">1</span>
        <span class="step-text">Select Japanese text on any webpage</span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span class="step-text">Click the <strong class="btn-preview">読</strong> button that appears</span>
      </div>
      <div class="step">
        <span class="step-num">3</span>
        <span class="step-text">Furigana & English hints added instantly</span>
      </div>
      <div class="step">
        <span class="step-num">4</span>
        <span class="step-text">Personalize colors in settings below</span>
      </div>
    </section>

    <div class="demo-box">
      <div class="demo-label">Example</div>
      <div class="demo-before">ソフトウェアの情報を勉強中。</div>
      <div class="demo-arrow">↓</div>
      <div class="demo-after">
        <ruby class="yomimark-ruby">ソフトウェア<rp>(</rp>
          <rt class="yomimark-rt-gairaigo">software</rt>
          <rp>)</rp>
        </ruby>の
        <ruby class="yomimark-ruby">情報<rp>(</rp>
          <rt class="yomimark-rt-kanji">じょうほう</rt>
          <rp>)</rp>
        </ruby>を
        <ruby class="yomimark-ruby">勉強中<rp>(</rp>
          <rt class="yomimark-rt-kanji">べんきょうちゅう</rt>
          <rp>)</rp>
        </ruby>。
      </div>
    </div>

    <div class="settings-section">
      <div class="setting-item">
        <label for="rt-color">Furigana Color</label>
        <input type="color" id="rt-color" value="#4a62a8">
      </div>
      <div class="setting-item">
        <label for="gairaigo-color">Gairaigo Color</label>
        <input type="color" id="gairaigo-color" value="#10b981">
      </div>
    </div>

    <footer class="popup-footer">
      <span>v1.1.7</span>
      <span>·</span>
      <span>Toshiki.Tech Lab</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
